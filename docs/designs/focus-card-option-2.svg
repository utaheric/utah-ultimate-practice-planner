    <rect x="18" y="18" width="168" height="82" rx="7" fill="#111827" stroke="#334155"/>
    <rect x="28" y="28" width="34" height="62" fill="none" stroke="#475569"/>
    <rect x="142" y="28" width="34" height="62" fill="none" stroke="#475569"/>
    <circle cx="76" cy="45" r="5" fill="#38bdf8"/><circle cx="96" cy="59" r="5" fill="#38bdf8"/><circle cx="118" cy="74" r="5" fill="#38bdf8"/>
    <circle cx="88" cy="78" r="5" fill="#f97316"/><circle cx="132" cy="49" r="5" fill="#f97316"/>
