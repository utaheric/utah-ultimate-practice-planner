<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#0f172a"/>
  <text x="34" y="44" fill="#f97316" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1">OPTION 2</text>
  <text x="34" y="72" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Field Note Tiles</text>
  <text x="34" y="98" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">Keeps the grid, but makes each focus feel more tactical and less empty.</text>

  <g transform="translate(34 130)">
    <rect width="204" height="236" rx="8" fill="#1f2937" stroke="#334155"/>
    <rect x="18" y="18" width="168" height="82" rx="7" fill="#111827" stroke="#334155"/>
