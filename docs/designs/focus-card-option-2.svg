    <text x="18" y="164" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Explosive changes of</text>
    <text x="18" y="183" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">direction and timing.</text>
